specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: BonfireCore
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"  # Replace after deploy
      abi: BonfireCore
      startBlock: 0  # Replace with deploy block number
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - BonfireSession
        - Contribution
        - ContributorStats
        - GlobalStats
      abis:
        - name: BonfireCore
          file: ./abis/BonfireCore.json
      eventHandlers:
        - event: BonfireIgnited(indexed uint256,indexed address,uint256)
          handler: handleBonfireIgnited
        - event: ContributionMade(indexed uint256,indexed address,uint8,bytes32,uint256,uint256)
          handler: handleContributionMade
        - event: BonfireExtinguished(indexed uint256,uint256,uint8,uint256)
          handler: handleBonfireExtinguished
      file: ./src/mapping.ts
